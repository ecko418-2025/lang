<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>直播画面展示</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Rye&display=swap" rel="stylesheet">
  
  <!-- Supabase JS -->
  <script src="https://jsd.onmicrosoft.cn/npm/@supabase/supabase-js@2"></script>

  <!-- Custom Configuration for Tailwind -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'wood': '#5D4037',
            'leather': '#8D6E63',
            'sepia-light': '#f4ebd8',
            'sepia-dark': '#d4c4a8',
          },
          fontFamily: {
            'western': ['Rye', 'cursive'],
            'serif': ['Playfair Display', 'serif'],
          },
          boxShadow: {
            'wood': '0 4px 6px -1px rgba(93, 64, 55, 0.5), 0 2px 4px -1px rgba(93, 64, 55, 0.3)',
          }
        }
      }
    }
  </script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: transparent; /* Must be transparent for OBS */
      font-family: 'Playfair Display', "Microsoft YaHei", serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
    }

    #scale-wrapper {
      width: 1920px;
      height: 1080px;
      position: relative;
      transform-origin: center center;
    }
    /* Circular Avatar Layout */
    .avatar-container {
      position: relative;
      display: flex;
      align-items: center;
      margin-bottom: 10px; /* Reduced margin to use vertical space */
    }

    /* Left side specifically */
    .left-avatar-container {
      flex-direction: row; /* Avatar left, status right */
      margin-left: 0px; /* Tight to left edge */
    }

    /* Right side specifically */
    .right-avatar-container {
      flex-direction: row-reverse; /* Avatar right, status left */
      margin-right: 0px; /* Tight to right edge */
    }

    .avatar-wrapper {
      position: relative;
      width: 140px; /* Enlarged from 110px */
      height: 140px; /* Enlarged from 110px */
      border-radius: 50%;
      border: 5px solid #d4af37; /* Slightly thicker gold border */
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
      background: #fff;
      z-index: 10;
    }

    .avatar-wrapper img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .seat-badge {
      position: absolute;
      top: -2px;
      width: 32px;
      height: 32px;
      background: radial-gradient(circle, #f9e596, #d4af37);
      border: 1px solid #8c6d23;
      border-radius: 50%;
      color: #000;
      font-weight: bold;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }
    .left-avatar-container .seat-badge { left: -5px; }
    .right-avatar-container .seat-badge { right: -5px; }

    .name-plate {
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, #f9e596, #d4af37);
      border: 1px solid #8c6d23;
      border-radius: 14px;
      padding: 3px 20px;
      color: #000;
      font-weight: bold;
      font-size: 18px;
      white-space: nowrap;
      z-index: 20;
      box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }

    .status-box {
      background: linear-gradient(to bottom, #dcdcdc, #9e9e9e);
      border: 2px solid #757575;
      border-radius: 20px;
      padding: 10px 5px;
      color: #000;
      font-weight: bold;
      font-size: 24px;
      width: 50px;
      min-height: 100px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      writing-mode: vertical-rl;
      text-orientation: upright;
      letter-spacing: 2px;
      box-shadow: inset 0 0 5px rgba(255,255,255,0.5), 2px 2px 5px rgba(0,0,0,0.5);
      z-index: 5;
    }
    
    /* Alive Role Colors */
    .avatar-container:not(.is-dead) .status-box.role-god {
      background: linear-gradient(to bottom, #d4ebd0, #a0c49d); /* light green */
      border-color: #7b9e76;
    }
    .avatar-container:not(.is-dead) .status-box.role-villager {
      background: linear-gradient(to bottom, #fff5d1, #f2d77d); /* light yellow */
      border-color: #c9aa4b;
    }
    .avatar-container:not(.is-dead) .status-box.role-wolf {
      background: linear-gradient(to bottom, #fad0c4, #ff9a9e); /* light red */
      border-color: #d16b71;
    }
    .left-avatar-container .status-box { margin-left: -15px; padding-left: 15px; }
    .right-avatar-container .status-box { margin-right: -15px; padding-right: 15px; }

    /* Custom Text Box */
    .custom-text-plate {
      background: linear-gradient(135deg, #2c3e50, #1a252f);
      color: #F9E596;
      border: 2px solid #D4AF37;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 20px;
      font-weight: bold;
      white-space: normal;        /* Allow wrapping */
      word-break: break-all;      /* Break at any character */
      width: fit-content;         /* Shrink to content */
      min-width: 2em;             /* Minimum 2 chars wide */
      max-width: 8em;             /* Cap at 8 characters */
      max-height: calc(20px * 1.5 * 4 + 8px); /* 4 lines max */
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 4;      /* Max 4 lines */
      -webkit-box-orient: vertical;
      margin: 0 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.8), inset 0 0 10px rgba(0,0,0,0.5);
      z-index: 4;
      letter-spacing: 1px;
      line-height: 1.5;
    }

    /* Death State Styles */
    .is-dead .avatar-wrapper img:not(.death-icon),
    .is-dead .avatar-wrapper .name-plate,
    .is-dead .avatar-wrapper .seat-badge {
      filter: grayscale(100%) brightness(0.6);
    }
    
    .is-dead .avatar-wrapper {
      border-color: #666; /* Optionally dim the gold border */
    }

    .is-dead .status-box {
      background: linear-gradient(to bottom, #dcdcdc, #9e9e9e) !important;
      border-color: #757575 !important;
      color: #555 !important;
    }

    /* Vertical Death Stamp (similar to campaign tag) */
    .death-stamp-vertical {
      border: 2px solid #b71c1c;
      color: #b71c1c;
      background: rgba(255, 255, 255, 0.85); /* Slightly translucent white */
      border-radius: 8px;
      padding: 8px 4px;
      font-weight: bold;
      font-size: 20px;
      writing-mode: vertical-rl;
      text-orientation: upright;
      letter-spacing: 2px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
      z-index: 5;
      margin: 0 5px;
    }

    .death-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: auto;
      z-index: 30;
      filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.8));
    }

    /* Sheriff badge: top-left corner of avatar-container for seats 1-6 */
    .left-avatar-container .sheriff-badge-left {
      position: absolute;
      top: -20px;
      left: -20px;
      width: 96px;
      height: 96px;
      z-index: 25;
      filter: drop-shadow(1px 1px 3px rgba(0,0,0,0.6));
    }

    /* Sheriff badge: top-right corner of avatar-container for seats 7-12 */
    .right-avatar-container .sheriff-badge-right {
      position: absolute;
      top: -20px;
      right: -20px;
      width: 96px;
      height: 96px;
      z-index: 25;
      filter: drop-shadow(1px 1px 3px rgba(0,0,0,0.6));
    }

    /* Campaign tag: vertical rectangle next to status box */
    .campaign-tag {
      background: linear-gradient(to bottom, #d32f2f, #b71c1c); /* Dark red */
      border: 2px solid #ffcc80; /* Gold border */
      border-radius: 8px;
      padding: 8px 4px;
      color: #fff;
      font-weight: bold;
      font-size: 20px;
      writing-mode: vertical-rl;
      text-orientation: upright;
      letter-spacing: 2px;
      box-shadow: inset 0 0 5px rgba(255,255,255,0.3), 2px 2px 5px rgba(0,0,0,0.5);
      z-index: 5;
      margin: 0 5px;
    }

    /* Top Banner */
    .top-banner-container {
      position: absolute;
      top: 0; /* Flush with top */
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* Align to top */
      gap: 50px;
      z-index: 50;
    }

    .side-banner {
      background-image: url('assets/bjk.png');
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
      background-color: transparent;
      border: none;
      color: #000;
      padding: 15px 60px; /* Reduced padding */
      font-size: 32px; /* Slightly smaller */
      font-weight: bold;
      box-shadow: none;
      position: relative;
      border-radius: 0;
      min-width: 280px;
      margin-top: 10px; /* Slight offset for side banners */
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-container {
      width: 700px; /* Slightly smaller to save space */
      height: 180px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    
    .logo-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
    }
  </style>
</head>
<body class="relative">
  <div id="scale-wrapper">
    <!-- Top Bar -->
    <div class="top-banner-container">
      <div class="side-banner" id="game-process">
        第6局 第3天
      </div>
      
      <div class="logo-container">
        <img src="assets/logo.png" alt="Logo" id="room-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <div style="display:none; font-size:40px; font-weight:bold; color:#d4af37; text-shadow:2px 2px 4px #000; font-family:'Rye', cursive;">
          WEREWOLF
        </div>
      </div>

      <div class="side-banner" id="game-setup">
        12-Player Standard
      </div>
    </div>

    <!-- Player Grid Layout -->
    <div class="absolute top-24 left-0 right-0 bottom-0 px-0 flex justify-between">
      
      <!-- Left Column (Seats 1-6) -->
      <div class="flex flex-col justify-around h-[880px] w-auto" id="left-column">
        <!-- Generated by JS -->
      </div>

      <!-- Right Column (Seats 7-12) -->
      <div class="flex flex-col justify-around h-[880px] w-auto" id="right-column">
        <!-- Generated by JS -->
      </div>

    </div>
  </div>

  <!-- Scripts -->
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script>
    // Auto-scale logic to fit any resolution
    function autoScale() {
      const wrapper = document.getElementById('scale-wrapper');
      const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      wrapper.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', autoScale);
    autoScale();
  </script>
</body>
</html>
