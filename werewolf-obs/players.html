<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>玩家数据库管理 - 狼人杀</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Supabase JS -->
  <script src="https://jsd.onmicrosoft.cn/npm/@supabase/supabase-js@2"></script>
  
  <!-- Cropper.js CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" />

  <style>
    body {
      background-color: #f4ebd8; /* Sepia light */
      color: #3e2723;
    }
    .panel {
      background: white;
      border: 2px solid #8D6E63;
      box-shadow: 4px 4px 0px #5D4037;
      border-radius: 8px;
    }
    .btn-primary {
      background-color: #5D4037;
      color: #f4ebd8;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .btn-primary:hover {
      background-color: #3e2723;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background-color: #8D6E63;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      background-color: #5D4037;
    }
    .btn-danger {
      background-color: #b71c1c;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .btn-danger:hover {
      background-color: #7f0000;
    }
    input {
      border: 1px solid #8D6E63;
      padding: 0.5rem;
      border-radius: 4px;
      background: #faf8f5;
      width: 100%;
    }
    input:focus {
      outline: 2px solid #5D4037;
      border-color: transparent;
    }
    
    /* Circular cropper mask */
    .cropper-view-box,
    .cropper-face {
      border-radius: 50%;
    }

    .player-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .player-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body class="p-6 font-sans min-h-screen">
  <div class="max-w-6xl mx-auto space-y-6">
    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-center border-b-4 border-[#5D4037] pb-4 mb-8 gap-4">
      <div class="flex items-center gap-4">
        <a href="admin.html" class="bg-[#8D6E63] text-white p-2 rounded-full hover:bg-[#5D4037] transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
        </a>
        <h1 class="text-4xl font-bold">玩家数据库管理中心</h1>
      </div>
      <div class="flex gap-4 w-full md:w-auto">
        <div class="relative flex-1 md:w-64">
          <input type="text" id="search-input" placeholder="搜索玩家姓名或 ID..." class="pl-10">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute left-3 top-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
        <button id="btn-sync-feishu" class="btn-secondary flex items-center gap-2 whitespace-nowrap">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
          </svg>
          同步全员至飞书
        </button>
        <button id="btn-add-player" class="btn-primary flex items-center gap-2 whitespace-nowrap">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
          </svg>
          新增玩家
        </button>
      </div>
    </div>

    <!-- Players Grid -->
    <div id="players-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <!-- Generated by JS -->
      <div class="col-span-full py-20 text-center text-gray-500 text-xl italic">
        正在加载玩家数据...
      </div>
    </div>
  </div>

  <!-- Player Form Modal (Add/Edit) -->
  <div id="player-modal" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden flex items-center justify-center p-4">
    <div class="panel bg-white p-8 w-full max-w-md animate-in fade-in zoom-in duration-200">
      <h2 id="modal-title" class="text-2xl font-bold border-b border-[#8D6E63] pb-2 mb-6">新增玩家</h2>
      
      <form id="player-form" class="space-y-4">
        <input type="hidden" id="edit-original-id">
        <div>
          <label class="block text-sm font-bold mb-1">玩家 ID</label>
          <input type="text" id="player-id" placeholder="如: 1, P001...">
        </div>
        <div>
          <label class="block text-sm font-bold mb-1">玩家名称</label>
          <input type="text" id="player-name" required placeholder="输入玩家名称">
        </div>
        <div>
          <label class="block text-sm font-bold mb-1">头像图片</label>
          <div class="flex items-center gap-4">
            <div id="current-avatar-preview" class="w-16 h-16 rounded bg-gray-100 flex items-center justify-center border border-gray-200 overflow-hidden">
              <span class="text-xs text-gray-400">无头像</span>
            </div>
            <div class="flex-1">
              <input type="file" id="player-avatar-file" accept="image/*" class="p-1 text-sm">
            </div>
          </div>
        </div>
        
        <div class="flex gap-4 pt-4 border-t border-gray-100 mt-6">
          <button type="button" id="btn-close-modal" class="flex-1 py-2 bg-gray-200 text-gray-800 font-bold rounded hover:bg-gray-300 transition">取消</button>
          <button type="submit" id="btn-submit-player" class="flex-1 py-2 btn-primary font-bold">保存玩家</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Cropper Modal -->
  <div id="cropper-modal" class="fixed inset-0 bg-black bg-opacity-80 z-50 hidden flex flex-col items-center justify-center p-4">
    <div class="bg-white p-4 rounded-lg shadow-xl w-full max-w-md flex flex-col items-center">
      <h3 class="text-xl font-bold mb-4 text-[#5D4037]">调整头像位置和大小</h3>
      <div class="relative w-full h-80 bg-gray-100 flex justify-center items-center overflow-hidden rounded">
        <img id="cropper-image" src="" alt="Avatar" class="max-w-full max-h-full hidden">
      </div>
      <p class="text-sm text-gray-500 mt-2 text-center w-full">拖动、缩放图片，确保头像处于正中的圆框内。</p>
      <div class="mt-6 flex justify-between w-full gap-4">
        <button id="btn-cancel-crop" class="flex-1 py-2 bg-gray-300 text-gray-800 font-bold rounded hover:bg-gray-400 transition">取消</button>
        <button id="btn-confirm-crop" class="flex-1 py-2 btn-primary font-bold">确认裁剪</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="players.js"></script>
</body>
</html>
