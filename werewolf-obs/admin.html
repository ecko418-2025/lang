<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>狼人杀 - 后台管理控制台</title>
  
  <!-- PWA Support -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="狼管家">
  <link rel="apple-touch-icon" href="assets/logo.png">
  
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Supabase JS -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  
  <!-- Cropper.js CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" />

  <!-- Tom Select (searchable dropdown) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.min.css">
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

  <style>
    /* Tom Select overrides */
    .ts-wrapper.seat-player { padding: 0; }
    .ts-control { border: 1px solid #8D6E63 !important; border-radius: 4px !important; background: #faf8f5 !important; font-size: 0.875rem; }
    .ts-dropdown { border: 1px solid #8D6E63 !important; font-size: 0.875rem; }
    .ts-dropdown .active { background: #8D6E63 !important; color: white !important; }
  </style>

  <style>
    body {
      background-color: #f4ebd8; /* Sepia light */
      color: #3e2723;
    }
    .panel {
      background: white;
      border: 2px solid #8D6E63;
      box-shadow: 4px 4px 0px #5D4037;
      border-radius: 8px;
    }
    .btn-primary {
      background-color: #5D4037;
      color: #f4ebd8;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .btn-primary:hover {
      background-color: #3e2723;
    }
    .btn-danger {
      background-color: #b71c1c;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 4px;
    }
    input, select {
      border: 1px solid #8D6E63;
      padding: 0.5rem;
      border-radius: 4px;
      background: #faf8f5;
      width: 100%;
    }
    
    /* Circular cropper mask */
    .cropper-view-box,
    .cropper-face {
      border-radius: 50%;
    }
  </style>
</head>
<body class="p-6 font-sans">
  <div class="max-w-7xl mx-auto mb-8 flex flex-col md:flex-row md:items-center justify-between gap-6 border-b-4 border-[#5D4037] pb-4">
    <h1 class="text-4xl font-bold whitespace-nowrap">狼人杀后台管理界面</h1>
    
    <!-- Top Navigation Bar (Simplified) -->
    <nav class="flex flex-wrap gap-3 items-center">
      <div class="text-xs font-bold text-[#5D4037] mr-1 px-2 border-r border-[#8D6E63] hidden sm:block">快速导航:</div>
      
      <a href="players.html" class="flex items-center gap-1.5 text-xs font-bold text-[#5D4037] hover:text-blue-700 transition px-3 py-1.5 rounded-lg bg-white border border-[#8D6E63] shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
          <path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z" />
        </svg>
        玩家数据库
      </a>
      
      <a href="standby.html" target="_blank" class="flex items-center gap-1.5 text-xs font-bold text-[#5D4037] hover:text-blue-700 transition px-3 py-1.5 rounded-lg bg-white border border-[#8D6E63] shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
          <path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z" />
        </svg>
        出战表
      </a>
      
      <a href="history.html" class="flex items-center gap-1.5 text-xs font-bold text-[#5D4037] hover:text-blue-700 transition px-3 py-1.5 rounded-lg bg-white border border-[#8D6E63] shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
          <path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z" />
        </svg>
        历史统计
      </a>
      
      <a href="index.html" target="_blank" class="flex items-center gap-1.5 text-xs font-bold text-blue-800 hover:text-blue-600 transition px-3 py-1.5 rounded-lg bg-blue-50 border border-blue-200 shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
          <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
          <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd" />
        </svg>
        OBS 主控
      </a>
    </nav>
  </div>

  <div class="max-w-7xl mx-auto space-y-6">
    <!-- Top Sections -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
      
      <!-- Section A: Player Database Management -->
      <div class="panel p-6 space-y-4">
        <div class="flex justify-between items-center border-b border-[#8D6E63] pb-2">
          <h2 class="text-2xl font-bold">A. 玩家数据库</h2>
          <a href="players.html" class="text-xs bg-[#5D4037] text-white px-2 py-1 rounded hover:bg-[#3e2723] transition flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
              <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
              <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd" />
            </svg>
            管理详情页
          </a>
        </div>
        
        <form id="add-player-form" class="space-y-3">
          <div>
            <label class="block text-sm font-bold mb-1">玩家 ID</label>
            <input type="text" id="new-player-id" placeholder="输入玩家 ID">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">玩家名称</label>
            <input type="text" id="new-player-name" required placeholder="输入玩家名称">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">头像图片（上传）</label>
            <input type="file" id="new-player-avatar-file" accept="image/*" class="p-1">
            <p class="text-xs text-gray-500 mt-1">请上传图片文件</p>
          </div>
          <button type="submit" class="btn-primary w-full">添加玩家</button>
        </form>

        <div class="mt-4 max-h-64 overflow-y-auto border border-[#8D6E63] rounded">
          <table class="w-full text-left text-sm" id="players-table">
            <thead class="bg-[#8D6E63] text-white">
              <tr>
                <th class="p-2">头像</th>
                <th class="p-2">玩家信息</th>
                <th class="p-2">操作</th>
              </tr>
            </thead>
            <tbody>
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- Section B: Game Configuration -->
      <div class="panel p-6 space-y-4">
        <h2 class="text-2xl font-bold border-b border-[#8D6E63] pb-2">B. 游戏版型配置</h2>
        
        <div class="space-y-3">
          <div>
            <label class="block text-sm font-bold mb-1">保存的版型库</label>
            <select id="config-setup-select" class="mb-2">
              <option value="">-- 自定义新版型 --</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">版型名称</label>
            <input type="text" id="config-setup-name" placeholder="例如：12人预女猎守">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">神职 (逗号或空格隔开)</label>
            <input type="text" id="config-gods" placeholder="预言家,女巫,猎人,守卫" value="预言家,女巫,猎人,守卫">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">狼人 (逗号或空格隔开)</label>
            <input type="text" id="config-wolves" placeholder="狼人,狼人,狼人,狼人" value="狼人,狼人,狼人,狼人">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">平民 (逗号或空格隔开)</label>
            <input type="text" id="config-villagers" placeholder="平民,平民,平民,平民" value="平民,平民,平民,平民">
          </div>
          
          <div class="text-sm font-bold text-gray-700" id="setup-card-count">当前卡牌总数: 12 张</div>

          <div class="flex gap-2 pt-2 border-t border-gray-200 mt-4">
            <button id="btn-save-setup" class="bg-[#8D6E63] text-white px-3 py-2 rounded hover:bg-[#5D4037] text-sm font-bold transition">💾 保存版型</button>
            <button id="btn-delete-setup" class="bg-red-700 text-white px-3 py-2 rounded hover:bg-red-800 text-sm font-bold transition">🗑️ 删除</button>
            <button id="btn-update-config" class="btn-primary flex-1 text-sm">应用并同步版型至 OBS</button>
          </div>
        </div>
      </div>

      <!-- Section B2: Standby Config -->
      <div class="panel p-6">
        <div class="flex justify-between items-center border-b border-[#8D6E63] pb-2 mb-4">
          <h2 class="text-2xl font-bold">出战表配置</h2>
          <a href="history.html" class="text-xs bg-[#5D4037] text-white px-2 py-1 rounded hover:bg-[#3e2723] transition flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
              <path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z" />
            </svg>
            历史记录
          </a>
        </div>
        
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-bold mb-1">左侧文字</label>
            <select id="standby-left">
              <option value="等待游戏开始">等待游戏开始</option>
              <option value="好人胜利">好人胜利</option>
              <option value="狼人胜利">狼人胜利</option>
              <option value="平局">平局</option>
              <option value="第三方胜利">第三方胜利</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">主标题</label>
            <input type="text" id="standby-title" placeholder="出战表">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">右侧文字</label>
            <input type="text" id="standby-date" placeholder="第一轮第二局">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">底部文字</label>
            <input type="text" id="standby-footer" placeholder="狼管家 Studio · 沉浸式狼人杀体验">
          </div>
          
          <!-- Scoring and Honors Group -->
          <div class="bg-blue-50/30 p-4 rounded-xl border border-blue-100 mt-4">
            <div class="flex justify-between items-center mb-4">
              <span class="text-sm font-bold text-blue-800">🏅 赛后结算配置 (荣誉 & 积分)</span>
              <button id="btn-reset-scores" class="text-[10px] bg-white hover:bg-gray-50 text-blue-700 px-3 py-1 rounded-lg border border-blue-200 shadow-sm transition font-bold">一键归零</button>
            </div>

            <!-- Honors Row -->
            <div class="flex gap-3 mb-6">
              <div class="flex-1">
                <label class="block text-[10px] font-bold text-yellow-600 mb-1">🥇 MVP</label>
                <select id="standby-mvp" class="w-full text-xs">
                  <option value="0">无</option>
                  <option value="1">1号位</option><option value="2">2号位</option><option value="3">3号位</option><option value="4">4号位</option><option value="5">5号位</option><option value="6">6号位</option>
                  <option value="7">7号位</option><option value="8">8号位</option><option value="9">9号位</option><option value="10">10号位</option><option value="11">11号位</option><option value="12">12号位</option>
                </select>
              </div>
              <div class="flex-1">
                <label class="block text-[10px] font-bold text-gray-500 mb-1">🥈 SVP</label>
                <select id="standby-svp" class="w-full text-xs">
                  <option value="0">无</option>
                  <option value="1">1号位</option><option value="2">2号位</option><option value="3">3号位</option><option value="4">4号位</option><option value="5">5号位</option><option value="6">6号位</option>
                  <option value="7">7号位</option><option value="8">8号位</option><option value="9">9号位</option><option value="10">10号位</option><option value="11">11号位</option><option value="12">12号位</option>
                </select>
              </div>
              <div class="flex-1">
                <label class="block text-[10px] font-bold text-red-600 mb-1">🥘 背锅侠</label>
                <select id="standby-scapegoat" class="w-full text-xs">
                  <option value="0">无</option>
                  <option value="1">1号位</option><option value="2">2号位</option><option value="3">3号位</option><option value="4">4号位</option><option value="5">5号位</option><option value="6">6号位</option>
                  <option value="7">7号位</option><option value="8">8号位</option><option value="9">9号位</option><option value="10">10号位</option><option value="11">11号位</option><option value="12">12号位</option>
                </select>
              </div>
            </div>

            <!-- Corrections Grid -->
            <div class="pt-2 border-t border-blue-100">
              <div class="grid grid-cols-4 sm:grid-cols-6 gap-x-2 gap-y-3" id="score-corrections-container">
                <script>
                  (function() {
                    const container = document.currentScript.parentElement;
                    for (let i = 1; i <= 12; i++) {
                      const div = document.createElement('div');
                      div.className = 'flex flex-col items-center';
                      div.innerHTML = `
                        <span class="text-[10px] font-bold text-gray-400 mb-0.5">${i}号</span>
                        <select class="score-correction-select text-sm p-1 h-9 w-full border-[#D4AF37]/30 font-bold text-blue-800" data-seat="${i}">
                          <option value="3">+3.0</option><option value="2.5">+2.5</option><option value="2">+2.0</option><option value="1.5">+1.5</option><option value="1">+1.0</option><option value="0.5">+0.5</option>
                          <option value="0" selected>0</option>
                          <option value="-0.5">-0.5</option><option value="-1">-1.0</option><option value="-1.5">-1.5</option><option value="-2">-2.0</option>
                        </select>
                      `;
                      container.appendChild(div);
                    }
                  })();
                </script>
              </div>
            </div>
          </div>
          
          <div class="pt-4 border-t border-gray-200 mt-2 flex gap-2">
            <button id="btn-sync-standby" class="btn-primary flex-1 text-sm">将以上配置同步至出战表</button>
            <button id="btn-save-history" class="bg-green-700 hover:bg-green-800 text-white px-3 py-2 rounded text-sm font-bold transition flex items-center gap-1">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
              </svg>
              本局统计存储
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Section C: Active Game Control (Seats 1-12) -->
    <div class="panel p-4 sm:p-6">
      <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center border-b border-[#8D6E63] pb-4 mb-4 gap-4">
        <h2 class="text-xl sm:text-2xl font-bold">C. 实时游戏控制（1-12号位）</h2>
        <div class="flex flex-wrap items-center gap-3 sm:gap-4 w-full lg:w-auto">
          <!-- Sheriff -->
          <div class="flex items-center gap-2 bg-[#f4ebd8] p-2 rounded-lg border border-[#8D6E63]/30">
            <label class="text-xs sm:text-sm font-bold whitespace-nowrap">警长任命:</label>
            <select id="sheriff-select" class="border border-[#8D6E63] rounded p-1 bg-white w-20 sm:w-24 text-sm">
              <option value="0">无</option>
              <option value="1">1号</option>
              <option value="2">2号</option>
              <option value="3">3号</option>
              <option value="4">4号</option>
              <option value="5">5号</option>
              <option value="6">6号</option>
              <option value="7">7号</option>
              <option value="8">8号</option>
              <option value="9">9号</option>
              <option value="10">10号</option>
              <option value="11">11号</option>
              <option value="12">12号</option>
            </select>
            <button id="btn-confirm-sheriff" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded text-xs sm:text-sm font-bold transition shadow-sm">确认</button>
          </div>

          <!-- Process -->
          <div class="flex items-center gap-2 bg-[#f4ebd8] p-2 rounded-lg border border-[#8D6E63]/30">
            <label class="text-xs sm:text-sm font-bold whitespace-nowrap">当前进度:</label>
            <select id="config-process" class="border border-[#8D6E63] rounded p-1 bg-white w-28 sm:w-40 text-sm">
              <option value="等待游戏开始">等待游戏开始</option>
              <option value="第一天">第一天</option>
              <option value="第二天">第二天</option>
              <option value="第三天">第三天</option>
              <option value="第四天及以后">第四天及以后</option>
              <option value="夜晚">夜晚</option>
            </select>
          </div>

          <!-- Actions -->
          <div class="flex gap-2 w-full sm:w-auto">
            <button id="btn-sync-seats" class="flex-1 sm:flex-none bg-[#5D4037] text-white px-4 py-2 rounded-lg text-xs sm:text-sm font-bold hover:bg-[#3e2723] shadow-md transition-all">同步至 OBS</button>
            <button id="btn-reset-game" class="flex-1 sm:flex-none bg-orange-600 text-white px-4 py-2 rounded-lg text-xs sm:text-sm font-bold hover:bg-orange-700 shadow-md transition-all flex items-center justify-center gap-1">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
              </svg>
              重置
            </button>
          </div>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="seats-container">
        <!-- Generated by JS -->
      </div>
    </div>

  </div>

  <!-- Cropper Modal -->
  <div id="cropper-modal" class="fixed inset-0 bg-black bg-opacity-80 z-50 hidden flex flex-col items-center justify-center p-4">
    <div class="bg-white p-4 rounded-lg shadow-xl w-full max-w-md flex flex-col items-center">
      <h3 class="text-xl font-bold mb-4 text-[#5D4037]">调整头像位置和大小</h3>
      <div class="relative w-full h-80 bg-gray-100 flex justify-center items-center overflow-hidden rounded">
        <img id="cropper-image" src="" alt="Avatar" class="max-w-full max-h-full hidden">
      </div>
      <p class="text-sm text-gray-500 mt-2 text-center w-full">拖动、缩放图片，确保头像处于正中的圆框内。</p>
      <div class="mt-6 flex justify-between w-full gap-4">
        <button id="btn-cancel-crop" class="flex-1 py-2 bg-gray-300 text-gray-800 font-bold rounded hover:bg-gray-400 transition">取消</button>
        <button id="btn-confirm-crop" class="flex-1 py-2 btn-primary font-bold">确认裁剪</button>
      </div>
    </div>
  </div>

  <!-- Cropper.js Script -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
